[scenario]
name         = FPGASID stereo (D400=8580 + D420=6581)
detect_wait  = 9

[expect]
; Slot index matches sid_list[n] (1-based; slot 0 unused).
; addr = SID base address (4 hex digits, no $)
; type = chip type code (hex, no $)
;
; Type codes:
;   01=6581  02=8580  04=SwinSID-U  05=ARMSID/ARM2SID
;   06=FPGASID-8580  07=FPGASID-6581  08=SwinSID-Nano
;   09=PD-SID  0A=BackSID  0B=SIDKick-pico  0C=KungFuSID
;   0D=uSID64  30=SIDFX  F0=Unknown

slot1_addr   = D400
slot1_type   = 06       ; FPGASID 8580 (primary)
slot2_addr   = D420
slot2_type   = 07       ; FPGASID 6581 (secondary)
