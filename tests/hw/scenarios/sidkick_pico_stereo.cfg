[scenario]
name         = SIDKick-pico stereo (D400 + D420)
detect_wait  = 12

[expect]
; SIDKick-pico dual SID configuration.
; Primary type: $0B (SIDKick-pico). Secondary model read via primary config
; mode (config[8] = CFG_SID2_TYPE): 0 = 6581 (type $01), non-zero = 8580 (type $02).
; Adjust slot2_type to match your SIDKick-pico secondary model configuration.

slot1_addr   = D400
slot1_type   = 0E       ; SIDKick-pico 6581 (change to 0B if primary configured as 8580)
slot2_addr   = D420
slot2_type   = 0B       ; SIDKick-pico 8580 (change to 0E if secondary configured as 6581)
